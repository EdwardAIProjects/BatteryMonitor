name: Build APKs

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-36.1" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore release keystore
        if: github.event_name != 'pull_request'
        env:
          BATTERYMONITOR_KEYSTORE_BASE64: ${{ secrets.BATTERYMONITOR_KEYSTORE_BASE64 }}
          BATTERYMONITOR_KEYSTORE_PASSWORD: ${{ secrets.BATTERYMONITOR_KEYSTORE_PASSWORD }}
          BATTERYMONITOR_KEY_ALIAS: ${{ secrets.BATTERYMONITOR_KEY_ALIAS }}
          BATTERYMONITOR_KEY_PASSWORD: ${{ secrets.BATTERYMONITOR_KEY_PASSWORD }}
        run: |
          if [ -z "$BATTERYMONITOR_KEYSTORE_BASE64" ] || [ -z "$BATTERYMONITOR_KEYSTORE_PASSWORD" ] || [ -z "$BATTERYMONITOR_KEY_ALIAS" ] || [ -z "$BATTERYMONITOR_KEY_PASSWORD" ]; then
            echo "::error::Missing one or more release signing secrets: BATTERYMONITOR_KEYSTORE_BASE64, BATTERYMONITOR_KEYSTORE_PASSWORD, BATTERYMONITOR_KEY_ALIAS, BATTERYMONITOR_KEY_PASSWORD."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystores"
          echo "$BATTERYMONITOR_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystores/batterymonitor-release.jks"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build signed release APK
        if: github.event_name != 'pull_request'
        env:
          BATTERYMONITOR_KEYSTORE_FILE: ${{ runner.temp }}/keystores/batterymonitor-release.jks
          BATTERYMONITOR_KEYSTORE_PASSWORD: ${{ secrets.BATTERYMONITOR_KEYSTORE_PASSWORD }}
          BATTERYMONITOR_KEY_ALIAS: ${{ secrets.BATTERYMONITOR_KEY_ALIAS }}
          BATTERYMONITOR_KEY_PASSWORD: ${{ secrets.BATTERYMONITOR_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/batterymonitor-debug-latest.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk dist/batterymonitor-release-latest.apk
          fi

      - name: Upload latest APK artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: batterymonitor-latest-apks
          path: dist/*.apk
          if-no-files-found: error

  publish-latest:
    name: Publish latest release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    concurrency:
      group: latest-apk-release
      cancel-in-progress: false

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: batterymonitor-latest-apks
          path: dist

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/latest" || true
          gh release create latest dist/*.apk \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest Build" \
            --notes "Installable debug and signed release APKs for $GITHUB_SHA. Requires Android 14 / API 34 or newer." \
            --latest

  publish-apk-repository:
    name: Publish to APK Repository
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    concurrency:
      group: apk-repository-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: batterymonitor-latest-apks
          path: dist

      - name: Upload release APK to APK Repository
        env:
          APK_REPOSITORY_URL: ${{ secrets.APK_REPOSITORY_URL }}
          APK_REPOSITORY_API_KEY: ${{ secrets.APK_REPOSITORY_API_KEY }}
        run: |
          if [ -z "$APK_REPOSITORY_URL" ]; then
            echo "::error::Missing APK_REPOSITORY_URL repository secret."
            exit 1
          fi
          if [ -z "$APK_REPOSITORY_API_KEY" ]; then
            echo "::error::Missing APK_REPOSITORY_API_KEY repository secret."
            exit 1
          fi
          apk="dist/batterymonitor-release-latest.apk"
          if [ ! -f "$apk" ]; then
            apk="$(find dist -name '*release*.apk' -print -quit)"
          fi
          if [ -z "$apk" ]; then
            echo "::error::No release APK found in downloaded artifacts."
            exit 1
          fi
          base_url="${APK_REPOSITORY_URL%/}"
          curl --fail-with-body \
            -H "Authorization: Bearer ${APK_REPOSITORY_API_KEY}" \
            -F "apk=@${apk};type=application/vnd.android.package-archive" \
            -F 'metadata={"release_channel":"release"}' \
            "${base_url}/api/v1/upload"
